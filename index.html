<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Para Namuu 💙</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #f6f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Playfair Display', serif;
    }

    .carta {
      background: white;
      width: 90%;
      max-width: 420px;
      padding: 28px 24px;
      border-radius: 18px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.08);
      display: none;
    }

    h1 {
      font-size: 1.15rem;
      margin-bottom: 18px;
      text-align: center;
      color: #2f3a56;
    }

    p {
      font-size: 0.95rem;
      line-height: 1.7;
      color: #3a3a3a;
      margin-bottom: 14px;
    }

    .firma {
      margin-top: 22px;
      font-size: 0.9rem;
      color: #2f3a56;
      text-align: right;
      font-style: italic;
    }

    .corazon {
      text-align: center;
      font-size: 1.3rem;
      margin-top: 10px;
      animation: latido 1.5s infinite;
    }

    @keyframes latido {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    .inicio {
      text-align: center;
      color: #2f3a56;
      font-size: 0.95rem;
      padding: 30px;
      cursor: pointer;
      animation: parpadeo 1.8s infinite;
    }

    @keyframes parpadeo {
      0%,100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>

  <div class="inicio" id="inicio">
    Toca la pantalla 💙
  </div>

  <div class="carta" id="carta">
    <h1>Para Namuu, mi chico bonito </h1>
    <div id="texto"></div>

    <div class="firma">
      Att: Mimi,<br>
      con todo el amor que cabe en estas palabras y un poquito más 💙✨
    </div>

    <div class="corazon">💙</div>
  </div>

  <audio id="musica" src="spring-snow.mp3" loop></audio>

  <script>
    const textoCompleto = `

He intentado escribir esta carta muchas veces… y siempre termino borrando todo, porque ninguna palabra me parecía suficiente para decir lo que realmente siento por ti. Es extraño cómo alguien puede volverse tan importante sin hacer ruido, sin avisar, sin pedir permiso… simplemente quedándose, poco a poco, en cada pensamiento, en cada recuerdo, en cada parte de mí.

No sé exactamente cuándo empezó todo esto. Tal vez fue en una conversación cualquiera, en una risa compartida, en uno de esos momentos simples que parecen pequeños pero cambian algo dentro de uno sin darse cuenta. Lo que sí sé es que desde entonces ya no soy el mismo. Porque desde que estás en mi vida, algo en mí se siente más tranquilo… más completo… más real.

Hay personas que pasan por nuestra vida como si fueran viento. Pero tú no. Tú llegaste como si fueras hogar.

A veces me sorprendo pensando en ti sin razón aparente. Cuando escucho una canción, cuando veo algo bonito, cuando tengo un día difícil o cuando simplemente quiero contarle a alguien lo que me pasa… siempre eres tú. Y eso me asusta un poco, porque nunca antes alguien había significado tanto para mí de esta manera.

Me gusta cómo miras el mundo. Me gusta la calma que transmites incluso cuando no dices nada. Me gusta tu forma de existir sin intentar ser alguien más. Pero sobre todo, me gusta cómo me haces sentir cuando estoy contigo. Porque contigo no necesito fingir, no necesito esconderme, no necesito ser diferente. Contigo puedo ser yo.

He guardado todo esto dentro de mí por mucho tiempo. No porque no quisiera decirlo, sino porque tenía miedo. Miedo de perder lo que tenemos. Miedo de que mis sentimientos fueran demasiado grandes, demasiado intensos, demasiado sinceros. Miedo de que después de decir esto ya nada volviera a ser igual.

Pero callarlo empezó a doler más que decirlo.

Namjoon, me importas de una forma que nunca imaginé sentir por alguien. No es algo pasajero, ni algo ligero, ni algo que pueda ignorar. Es algo que creció conmigo, que se volvió parte de mis días, de mis pensamientos, de mis silencios también.

Hay momentos en los que imagino cómo sería caminar contigo sin miedo, sin dudas, sin tener que esconder lo que siento. Imagino lo bonito que sería compartir más tiempo contigo, reír contigo más seguido, apoyarte cuando lo necesites, quedarme cuando todo sea difícil, celebrar contigo cuando todo salga bien. Imagino lo que sería poder decir sin miedo que quiero estar a tu lado.

No sé si tú sientes algo parecido. No sé si en tu corazón hay un espacio para mí de la misma manera en que en el mío lo hay para ti. Y decir esto me hace vulnerable… pero también me hace honesto.

Si supieras cuántas veces pensé en quedarme callado.

Si supieras cuántas veces decidí no escribir esto.

Pero también pensé que tal vez merecías saber la verdad. Porque lo que siento por ti es demasiado importante como para esconderlo para siempre.

No te escribo esto para presionarte. No te escribo esto esperando una respuesta perfecta. Te escribo esto porque eres alguien que cambió mi vida de una forma silenciosa pero profunda, y porque necesitaba que lo supieras.

Si algún día decides tomar mi mano y caminar conmigo, prometo cuidarte con la sinceridad con la que hoy te escribo estas palabras. Prometo estar contigo en lo simple y en lo difícil. Prometo no dejar de elegirte.

Y si tu camino es distinto al mío… aun así gracias. Gracias por existir en mi vida. Gracias por enseñarme que todavía es posible sentir algo tan verdadero por alguien. Gracias por haber llegado sin avisar y quedarte de una manera tan especial dentro de mí.

Si pudiera elegir encontrarte otra vez en cualquier otra vida, volvería a hacerlo sin pensarlo.

Porque si se trata de ti… siempre valdría la pena.

Con todo lo que siento por ti, Mimi.
`;

    let i = 0;
    const velocidad = 22;

    function escribirTexto() {
      if (i < textoCompleto.length) {
        document.getElementById("texto").innerHTML +=
          textoCompleto.charAt(i) === "\n" ? "<br><br>" : textoCompleto.charAt(i);
        i++;
        setTimeout(escribirTexto, velocidad);
      }
    }

    document.getElementById("inicio").addEventListener("click", () => {
      document.getElementById("inicio").style.display = "none";
      document.getElementById("carta").style.display = "block";
      document.getElementById("musica").play();
      escribirTexto();
    });
  </script>

</body>
</html>
